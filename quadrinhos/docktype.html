const overlay = document.getElementById('overlay');
const closeBtn = document.getElementById('closeBtn');
const coin3dInner = document.getElementById('coin3dInner');
const coin3dFront = document.getElementById('coin3dFront');
const coin3dBack = document.getElementById('coin3dBack');
const infoNum = document.getElementById('infoNum');
const infoTitle = document.getElementById('infoTitle');
const infoSub = document.getElementById('infoSub');
const infoDetails = document.getElementById('infoDetails');
const infoDesc = document.getElementById('infoDesc');

function showCoin(idx) {
  const data = coinsData[idx];

  coin3dFront.src = data.front;
  coin3dBack.src = data.back;
  coin3dInner.style.animationPlayState = 'running';

  infoNum.textContent = data.num;
  infoTitle.textContent = data.title;
  infoSub.textContent = data.sub;
  infoDetails.innerHTML = data.details.map(d =>
    `<div class="coin-info-detail">
      <div class="coin-info-detail-label">${d.label}</div>
      <div class="coin-info-detail-value">${d.value}</div>
    </div>`
  ).join('');
  infoDesc.textContent = data.desc;

  document.querySelectorAll('.coin-wrap').forEach(w => w.classList.remove('hovered'));
  document.querySelector(`.coin-wrap[data-coin="${idx}"]`).classList.add('hovered');

  overlay.classList.add('active');
}

function hideAll() {
  document.querySelectorAll('.coin-wrap').forEach(w => w.classList.remove('hovered'));
  overlay.classList.remove('active');
}

document.querySelectorAll('.coin-wrap').forEach(wrap => {
  const idx = parseInt(wrap.dataset.coin);
  wrap.addEventListener('click', () => showCoin(idx));
});

document.getElementById('coin3d').addEventListener('click', (e) => {
  e.stopPropagation();
  const state = coin3dInner.style.animationPlayState;
  coin3dInner.style.animationPlayState = state === 'paused' ? 'running' : 'paused';
});

closeBtn.addEventListener('click', hideAll);
overlay.addEventListener('click', (e) => { if (e.target === overlay) hideAll(); });
